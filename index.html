<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사업현황 대시보드</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .header .last-updated {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #eee;
            color: #888;
            font-size: 0.95em;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .stat-card .number {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-card .label {
            color: #666;
            font-size: 1.1em;
        }

        .quick-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .quick-links a {
            display: inline-block;
            padding: 15px 30px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1em;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 2px solid #667eea;
        }

        .quick-links a:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .quick-links a::before {
            content: "📝 ";
            margin-right: 8px;
        }

        .quick-links a:nth-child(2)::before {
            content: "📖 ";
        }

        .controls {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .controls select {
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.1em;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .controls select:focus {
            outline: none;
            border-color: #667eea;
        }

        .table-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            white-space: nowrap;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        tbody tr:hover {
            background: #f8f9ff;
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            background: #ff6b6b;
            color: white;
            margin: 2px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 1.2em;
        }

        .empty-state::before {
            content: "📋";
            display: block;
            font-size: 4em;
            margin-bottom: 20px;
        }

        .empty-state.highlight {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            border-radius: 15px;
            padding: 80px 20px;
            font-size: 1.5em;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        .empty-state.highlight::before {
            content: "👤";
            font-size: 5em;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .quick-links {
                flex-direction: column;
            }

            .quick-links a {
                width: 100%;
            }

            .stat-card .number {
                font-size: 2em;
            }

            .controls select {
                max-width: 100%;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 10px;
            }
        }
    </style>
</head>

    "사업관리구분": "성과관리사업",
    "미비항목": "1.원인행위"
  },
  {
    "부서명": "교수학습개발팀",
    "사업": "(혁신3)기초소양교육 지원 프로그램 운영(교수학습개발팀)",
    "사업관리구분": "",
    "미비항목": "사업관리구분"
  },
  {
    "부서명": "장애학생지원센터",
    "사업": "(국고)장애학생도우미 지원금(장애학생지원센터)",
    "사업관리구분": "",
    "미비항목": "1.원인행위, 사업관리구분"
  }
];

        let filteredData = [];

        function updateStats() {
            const deptFilter = document.getElementById('deptFilter').value;
            
            if (!deptFilter) {
                document.getElementById('statsContainer').innerHTML = '';
                return;
            }
            
            const totalProjects = sampleData.filter(item => item.부서명 === deptFilter).length;
            const missingProjects = filteredData.length;

            const statsHTML = `
                <div class="stat-card">
                    <div class="number">${totalProjects}</div>
                    <div class="label">대상사업수</div>
                </div>
                <div class="stat-card">
                    <div class="number">${missingProjects}</div>
                    <div class="label">미작성사업건수</div>
                </div>
            `;

            document.getElementById('statsContainer').innerHTML = statsHTML;
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const deptFilter = document.getElementById('deptFilter').value;
            
            if (!deptFilter) {
                tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state highlight">예산부서를 선택해주세요</div></td></tr>';
                return;
            }
            
            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">검색 결과가 없습니다</div></td></tr>';
                return;
            }

            tbody.innerHTML = filteredData.map((item, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${item.부서명}</strong></td>
                    <td>${item.사업}</td>
                    <td>${item.사업관리구분 || '<span style="color: #999;">미지정</span>'}</td>
                    <td>
                        ${item.미비항목.split(', ').map(tag => 
                            `<span class="badge">${tag}</span>`
                        ).join('')}
                    </td>
                </tr>
            `).join('');
        }

        function populateDeptFilter() {
            const depts = [...new Set(sampleData.map(item => item.부서명))].sort();
            const select = document.getElementById('deptFilter');
            
            depts.forEach(dept => {
                const option = document.createElement('option');
                option.value = dept;
                option.textContent = dept;
                select.appendChild(option);
            });
        }

        function applyFilters() {
            const deptFilter = document.getElementById('deptFilter').value;

            // 예산부서가 선택되지 않으면 빈 배열
            if (!deptFilter) {
                filteredData = [];
            } else {
                filteredData = sampleData.filter(item => item.부서명 === deptFilter);
            }

            updateStats();
            renderTable();
        }

        document.getElementById('deptFilter').addEventListener('change', applyFilters);

        populateDeptFilter();
        renderTable();
    </script>
</body>
</html>
